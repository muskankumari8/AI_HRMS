<!DOCTYPE html>
<html>
<head>

<title>Performance Analyzer</title>

<style>

body{
    font-family:Arial;
    background:#eef4f7;
    padding:40px;
}

.container{

    max-width:700px;

    margin:auto;

    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:
    0px 5px 20px rgba(0,0,0,0.15);
}

h1{

    text-align:center;

    color:#0B2E33;

    margin-bottom:20px;
}

select,
input{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:8px;
}

button{

    width:100%;

    padding:12px;

    border:none;

    background:#4F7C82;

    color:white;

    border-radius:8px;

    cursor:pointer;
}

button:hover{

    background:#0B2E33;
}

.result{

    margin-top:20px;

    background:#d4edda;

    padding:15px;

    border-radius:10px;

    color:#155724;
}

</style>

</head>

<body>

<div class="container">

<h1>Employee Performance Analyzer</h1>

<form method="POST">

<select
name="employee_name"
required>

<option value="">
Select Employee
</option>

{% for employee in employees %}

<option value="{{ employee[0] }}">
{{ employee[0] }}
</option>

{% endfor %}

</select>

<input
type="number"
name="attendance"
placeholder="Attendance Score"
min="0"
max="100"
required>

<input
type="number"
name="task"
placeholder="Task Completion Score"
min="0"
max="100"
required>

<input
type="number"
name="feedback"
placeholder="Manager Feedback Score"
min="0"
max="100"
required>

<button type="submit">

Analyze Performance

</button>

</form>

{% if result %}

<div class="result">

{{ result }}

</div>

{% endif %}

</div>

</body>
</html>
