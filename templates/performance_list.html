<!DOCTYPE html>
<html>
<head>
<title>Performance Records</title>
</head>
<body>

<h1>Performance Records</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Employee</th>
<th>Attendance</th>
<th>Task</th>
<th>Feedback</th>
<th>Score</th>
<th>Level</th>

</tr>

{% for r in records %}

<tr>

<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
<td>{{ r[6] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
