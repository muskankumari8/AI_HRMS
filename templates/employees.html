<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employee Management - AI HRMS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #0B2E33;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #4F7C82;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4F7C82;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0B2E33;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header p {
            color: gray;
            margin-top: 5px;
        }
    </style>

</head>

<body>
    

    <div class="container">

        <div class="header">
            <h1>AI HRMS</h1>
            <p>Add New Employee</p>
        </div>
        {% if message %}
        <p style="color:green; text-align:center;">
            {{ message }}
        </p>
        {% endif %}

        <form method="POST">

            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" name="name" placeholder="Enter employee name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" placeholder="Enter department" required>
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" name="salary" placeholder="Enter salary" required>
            </div>

            <button type="submit">
                Add Employee
            </button>

        </form>

    </div>

</body>

</html>
