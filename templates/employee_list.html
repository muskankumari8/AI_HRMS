<!DOCTYPE html>
<html>
<head>
    <title>Employee List</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0B2E33;
            margin-bottom:25px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#4F7C82;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f2f2f2;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:6px;
        }

        .delete-btn:hover{
            background:#b02a37;
        }

        .add-btn{
            display:inline-block;
            margin-bottom:20px;
            padding:10px 15px;
            background:#4F7C82;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        .add-btn:hover{
            background:#0B2E33;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Employee List</h1>

    <a href="/employees" class="add-btn">
        Add New Employee
    </a>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>
        </tr>

        {% for employee in employees %}

        <tr>

            <td>{{ employee[0] }}</td>
            <td>{{ employee[1] }}</td>
            <td>{{ employee[2] }}</td>
            <td>{{ employee[3] }}</td>
            <td>₹ {{ employee[4] }}</td>

            <td>

                <a
                    href="/delete-employee/{{ employee[0] }}"
                    class="delete-btn"
                    onclick="return confirm('Delete this employee?')">
                    Delete
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
