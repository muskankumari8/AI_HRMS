<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screening</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #0B2E33;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        h3 {
            color: #4F7C82;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4F7C82;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0B2E33;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #eef9fb;
            border-left: 6px solid #4F7C82;
            border-radius: 10px;
        }

        .result-box h2 {
            color: #0B2E33;
            margin-bottom: 15px;
        }

        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>AI Resume Screening System</h1>

        <p>
            Upload a candidate resume and compare it with the job description using AI.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <h3>Job Description</h3>

            <textarea
                name="job_description"
                rows="8"
                placeholder="Enter the Job Description here..."
                required></textarea>

            <br><br>

            <h3>Upload Resume (PDF)</h3>

            <input
                type="file"
                name="resume"
                accept=".pdf"
                required>

            <br><br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

        {% if result %}

        <div class="result-box">

            <h2>AI Evaluation Result</h2>

            <div class="result-content">
                {{ result }}
            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
