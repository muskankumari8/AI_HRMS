<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0B2E33;
            margin-bottom:25px;
        }

        select,
        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4F7C82;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0B2E33;
        }

        .success{
            margin-top:20px;
            background:#d4edda;
            color:#155724;
            padding:15px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Attendance Management</h1>

    <form method="POST">

        <label>Select Employee</label>

        <select
            name="employee_name"
            required>

            <option value="">
                Choose Employee
            </option>

            {% for employee in employees %}

            <option value="{{ employee[0] }}">
                {{ employee[0] }}
            </option>

            {% endfor %}

        </select>

        <label>Date</label>

        <input
            type="date"
            name="date"
            required>

        <label>Status</label>

        <select
            name="status"
            required>

            <option value="">
                Select Status
            </option>

            <option value="Present">
                Present
            </option>

            <option value="Absent">
                Absent
            </option>

            <option value="Work From Home">
                Work From Home
            </option>

            <option value="Leave">
                Leave
            </option>

        </select>

        <button type="submit">
            Mark Attendance
        </button>

    </form>

    {% if message %}

    <div class="success">

        {{ message }}

    </div>

    {% endif %}

</div>

</body>
</html>
