<!DOCTYPE html>
<html>
<head>
    <title>AI HR Chatbot</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0B2E33;
        }

        textarea{
            width:100%;
            padding:15px;
            border:1px solid #ccc;
            border-radius:8px;
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#4F7C82;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0B2E33;
        }

        .answer{
            margin-top:25px;
            padding:20px;
            background:#eef9fb;
            border-left:5px solid #4F7C82;
            white-space:pre-wrap;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>AI HR Assistant</h1>

    <form method="POST">

        <textarea
            name="question"
            rows="8"
            placeholder="Ask HR related questions..."
            required></textarea>

        <button type="submit">
            Ask AI
        </button>

    </form>

    {% if answer %}

    <div class="answer">
        {{ answer }}
    </div>

    {% endif %}

</div>

</body>
</html>
