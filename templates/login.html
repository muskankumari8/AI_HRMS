<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#eef4f7;
}

.container{

    width:400px;

    margin:80px auto;

    background:white;

    padding:30px;

    border-radius:15px;

    box-shadow:
    0px 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#0B2E33;
}

input,
select{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ccc;

    border-radius:8px;
}

button{

    width:100%;

    padding:12px;

    background:#4F7C82;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;
}

.error{

    color:red;

    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>AI HRMS Login</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<select
name="role"
required>

<option value="">
Select Role
</option>

<option>
Admin
</option>

<option>
HR Recruiter
</option>

<option>
Senior Manager
</option>

<option>
Employee
</option>

</select>

<button type="submit">
Login
</button>

</form>

<p class="error">

{{ message }}

</p>

</div>

</body>
</html>
