<!DOCTYPE html>
<html>
<head>

    <title>Attendance Records</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#0B2E33;
            margin-bottom:25px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#4F7C82;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:6px;
        }

        .delete-btn:hover{
            background:#b02a37;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Attendance Records</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Employee Name</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        {% for record in attendance_records %}

        <tr>

            <td>{{ record[0] }}</td>

            <td>{{ record[1] }}</td>

            <td>{{ record[2] }}</td>

            <td>{{ record[3] }}</td>

            <td>

                <a
                href="/delete-attendance/{{ record[0] }}"
                class="delete-btn"
                onclick="return confirm('Delete attendance record?')">

                Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
